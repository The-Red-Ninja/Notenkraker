function seekInPlayer(fraction){
  const a = playerState.audio;
  if(!a || !a.duration) return;
  a.currentTime = a.duration * Math.max(0,Math.min(1,fraction));
  updateProgress();
  if(!WV.dragging){
    const prog = progressNow(), zf = zoomFrac();
    const maxVO = Math.max(0, 1 - zf);
    if(zf >= 0.999){
      // Volledig uitgezoomed: headPos = prog
      WV.viewOffset = 0;
      WV.headPos = prog;
    } else if(prog > maxVO + TARGET_HEAD * zf){
      // Bijna einde: pin viewOffset, headPos loopt door
      WV.viewOffset = maxVO;
      WV.headPos = (prog - maxVO) / zf;
    } else if(prog < TARGET_HEAD * zf){
      // Begin van nummer: headPos = prog/zf (nog niet op TARGET_HEAD)
      WV.headPos = prog / zf;
      WV.viewOffset = 0;
    } else {
      // Normaal: headPos op TARGET_HEAD, viewOffset scrollt mee
      WV.headPos = TARGET_HEAD;
      WV.viewOffset = Math.max(0, Math.min(maxVO, prog - TARGET_HEAD * zf));
    }
    // Als drift actief was, zet het ook juist
    if(WV.driftActive && WV.headPos >= TARGET_HEAD) WV.driftActive = false;
    drawWaveforms();
  }
}

function updateProgress(){
  const a = playerState.audio;
  if(!a || !a.duration) return;
  const progress = a.currentTime / a.duration;
  ['0','1','2'].forEach(i=>{
    const t  = document.getElementById('ptime-'+i);
    if(t) t.textContent = fmtTime(a.currentTime);
  });
  ['1','2'].forEach(i=>{
    const sk = document.getElementById('pseek-'+i);
    if(sk) sk.value = Math.round(progress*1000);
  });
  // Only update viewOffset if nothing else is animating
  if(!WV.dragging && !WV.driftActive){
    const prog = progressNow(), zf = zoomFrac();
    WV.viewOffset = clampViewOffset(prog - WV.headPos * zf, zf);
  }
  // drawWaveforms is driven by the render loop — not called here
}

// ─────────────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════
// WAVEFORM ENGINE
// ════════════════════════════════════════════════════
//
// viewOffset  = fraction (0..1-zoomFrac): left edge of visible window
// TARGET_HEAD = 0.30 = 30% from left: resting position of playhead in bar
//
// During playback (no drag):
//   playhead drifts toward TARGET_HEAD; waveform scrolls so that the
//   correct song position stays under the moving playhead.
//   → viewOffset = progress - headPos * zoomFrac
//   headPos animates toward TARGET_HEAD over time.
//
// During manual drag:
//   localFrac in [0.00, 0.10]  → scroll LEFT  (speed ∝ distance from 0.10)
//   localFrac in [0.10, 0.90]  → direct seek; waveform does NOT scroll;
//                                  playhead moves on the bar.
//   localFrac in [0.90, 1.00]  → scroll RIGHT (speed ∝ distance from 0.90)
//
// After drag release:
//   headPos drifts back to TARGET_HEAD; waveform adjusts accordingly.

const TARGET_HEAD    = 0.30;   // resting position of playhead in bar
const SCROLL_L_EDGE  = 0.10;   // left scroll zone boundary
const SCROLL_R_EDGE  = 0.90;   // right scroll zone boundary
const MAX_SCROLL_SPD = 0.012;  // viewOffset shift per rAF frame at max speed
const HEAD_DRIFT_SPD = 0.008;  // headPos drift per rAF frame toward TARGET_HEAD

// Waveform view state
const WV = {
  viewOffset:  0,   // 0..1-zoomFrac: left edge of visible window
  headPos:     0,   // 0..1: where playhead sits on the bar
  dragging:    false,
  scrollDir:   0,
  driftActive: false,   // true while drifting headPos to TARGET_HEAD
  scrollRafId: null,
};

// ── helpers ──────────────────────────────────────────
function zoomFrac(){
  const dur = playerState.duration || 1;
  return Math.min(playerState.zoomSecs, dur) / dur;
}
function clampViewOffset(vo, zf){ return Math.max(0, Math.min(1 - zf, vo)); }
function progressNow(){
  const a = playerState.audio;
  return (a && a.duration) ? a.currentTime / a.duration : 0;
}

// ── drawing ──────────────────────────────────────────
function drawWaveforms(){
  const prog = progressNow();
  const zf   = zoomFrac();
  const vs   = clampViewOffset(WV.viewOffset, zf);
  const hp   = WV.headPos;          // playhead position in bar (0..1)

  playerState.waveCanvases.forEach(cv => {
    if(!cv.parentElement) return;
    const rect = cv.getBoundingClientRect();
    const W = Math.round(rect.width) || 300, H = 60;
    if(cv.width  !== W) cv.width  = W;
    if(cv.height !== H) cv.height = H;
    const ctx  = cv.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    const data = playerState.waveformData;

    // No audio yet — draw placeholder
    if(!data.length){
      ctx.fillStyle = '#ddd';
      for(let i=0; i<60; i++){
        const h = (Math.sin(i*0.4)*0.3 + 0.4) * H * 0.7;
        ctx.fillRect(i*(W/60)+1, H/2-h/2, W/60-2, h);
      }
      // Playhead at TARGET_HEAD
      ctx.fillStyle = '#aaa';
      ctx.fillRect(Math.round(TARGET_HEAD*W)-1, 0, 2, H);
      return;
    }

    const n      = data.length;
    const iStart = Math.floor(vs * n);
    const iEnd   = Math.ceil((vs + zf) * n);
    const visN   = Math.max(iEnd - iStart, 1);
    const barW   = W / visN;

    for(let i = iStart; i < iEnd; i++){
      const di = Math.min(i, n-1);
      const h  = Math.max(2, data[di] * H * 0.88);
      const x  = (i - iStart) * barW;
      const fracInTotal = i / n;
      // "played" = song has passed this point
      ctx.fillStyle = fracInTotal < prog ? '#444' : '#c0b898';
      ctx.fillRect(x+0.3, (H-h)/2, Math.max(barW-0.6, 1), h);
    }

    // Playhead line at headPos
    const headX = Math.round(hp * W);
    ctx.fillStyle = '#222';
    ctx.fillRect(headX-1, 0, 2, H);
  });
}

function startDrift(){
  WV.driftActive = true;
  startRenderLoop();
}

function stepScroll(){
  // Called from renderLoop when scrollRafId is set
  if(!WV.dragging || WV.scrollDir === 0){ WV.scrollRafId = null; return; }
  const zf  = zoomFrac();
  const step = WV.scrollDir * MAX_SCROLL_SPD;
  WV.viewOffset = clampViewOffset(WV.viewOffset + step, zf);
  // Seek audio to the position under the playhead edge
  const dur = playerState.duration;
  if(playerState.audio && dur){
    const seekFrac = WV.scrollDir < 0 ? WV.viewOffset : (WV.viewOffset + zf);
    playerState.audio.currentTime = Math.max(0, Math.min(dur, seekFrac * dur));
  }
}
function startScroll(){
  WV.scrollRafId = 1;
  startRenderLoop();
}

// syncViewToPlayback replaced by renderLoop

// ── handle pointer position on the waveform bar ──
function waveHandlePosition(localFrac, idx){
  if(localFrac <= SCROLL_L_EDGE){
    // LEFT scroll zone (0-10%): scroll waveform left = seek earlier
    const intensity = 1 - (localFrac / SCROLL_L_EDGE); // 1 at 0%, 0 at 10%
    WV.scrollDir = -intensity;
    WV.driftActive = false; // scroll overrides drift
    startScroll();
  } else if(localFrac >= SCROLL_R_EDGE){
    // RIGHT scroll zone (90-100%): scroll waveform right = seek later
    const intensity = (localFrac - SCROLL_R_EDGE) / (1 - SCROLL_R_EDGE);
    WV.scrollDir = +intensity;
    WV.driftActive = false;
    startScroll();
  } else {
    // MIDDLE zone (10-90%): direct seek, waveform does NOT scroll
    WV.scrollDir = 0;
    WV.scrollRafId = null;
    const zf  = zoomFrac();
    const maxVO = Math.max(0, 1 - zf);
    const vs  = Math.max(0, Math.min(maxVO, WV.viewOffset));
    const songFrac = vs + localFrac * zf;
    WV.headPos = localFrac;
    seekInPlayer(Math.max(0, Math.min(1, songFrac)));
  }
}

function getLocalFrac(clientX, idx){
  const wrap = document.getElementById('pwrap-'+idx);
  if(!wrap) return 0.5;
  const rect = wrap.getBoundingClientRect();
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

function waveSeekTouch(event, idx){
  event.preventDefault();
  WV.dragging = true;
  if(WV.driftActive){ cancelAnimationFrame(WV.driftActive); WV.driftActive=null; }
  waveHandlePosition(getLocalFrac(event.touches[0].clientX, idx), idx);
  const mv = e2 => {
    e2.preventDefault();
    waveHandlePosition(getLocalFrac(e2.touches[0].clientX, idx), idx);
  };
  const up = () => {
    WV.dragging  = false;
    WV.scrollDir = 0;
    WV.scrollRafId = null;
    document.removeEventListener('touchmove', mv);
    // Set headPos to actual song position in current view
    const prog = progressNow(), zf = zoomFrac();
    const vs = clampViewOffset(WV.viewOffset, zf);
    WV.headPos = Math.max(0, Math.min(1, (prog - vs) / zf));
    if(playerState.isPlaying) startDrift();
    else { startRenderLoop(); setTimeout(stopRenderLoop, 100); }
  };
  document.addEventListener('touchmove',   mv, {passive:false});
  document.addEventListener('touchend',    up, {once:true});
  document.addEventListener('touchcancel', up, {once:true});
}

function waveSeekMouse(event, idx){
  WV.dragging = true;
  if(WV.driftActive){ cancelAnimationFrame(WV.driftActive); WV.driftActive=null; }
  waveHandlePosition(getLocalFrac(event.clientX, idx), idx);
  const mv = e2 => waveHandlePosition(getLocalFrac(e2.clientX, idx), idx);
  const up = () => {
    WV.dragging  = false;
    WV.scrollDir = 0;
    WV.scrollRafId = null;
    document.removeEventListener('mousemove', mv);
    const prog = progressNow(), zf = zoomFrac();
    const vs = clampViewOffset(WV.viewOffset, zf);
    WV.headPos = Math.max(0, Math.min(1, (prog - vs) / zf));
    if(playerState.isPlaying) startDrift();
    else { startRenderLoop(); setTimeout(stopRenderLoop, 100); }
  };
  document.addEventListener('mousemove', mv);
  document.addEventListener('mouseup',   up, {once:true});
}

// ZOOM COL AFSTEMMEN OP BOVENKANT SEEK SLIDER

function alignZoomCol(idx){
  // Zoom-elementen krijgen:
  //   bovenkant = bovenkant tempobalk (speed-row)
  //   onderkant = onderkant wavevormbalk
  // We meten de posities relatief t.o.v. player-flex en stellen hoogte+marginTop in.
  const flex      = document.getElementById('player-flex-'+idx);
  const speedRow  = document.querySelector('#player-content-'+idx+' .player-speed-row');
  const waveWrap  = document.getElementById('pwrap-'+idx);
  const zoomWrap  = document.getElementById('zoom-wrap-'+idx);
  if(!flex || !speedRow || !waveWrap || !zoomWrap) return;

  const flexTop   = flex.getBoundingClientRect().top;
  const speedTop  = speedRow.getBoundingClientRect().top;
  const waveBot   = waveWrap.getBoundingClientRect().bottom;

  const marginTop = Math.max(0, Math.round(speedTop - flexTop));
  const height    = Math.max(10, Math.round(waveBot - speedTop));

  zoomWrap.style.marginTop  = marginTop + 'px';
  zoomWrap.style.height     = height + 'px';
  zoomWrap.style.flex       = 'none'; // geen flex:1 meer, vaste hoogte
  zoomWrap.style.paddingBottom = '0';
}

function getAppHeight(){
  // Gebruik visualViewport indien beschikbaar: dit is de echte bruikbare hoogte
  // excl. Android navigation bar en iOS bottom bar
  if(window.visualViewport) return Math.round(window.visualViewport.height);
  return window.innerHeight;
}

function updateStaffZone(){
  const appH = getAppHeight();
  const appMid = Math.round(appH / 2); // verticaal midden van het scherm

  // Stel app hoogte in
  document.documentElement.style.setProperty('--app-h', appH + 'px');
  document.body.style.height = appH + 'px';
  const appEl = document.getElementById('app');
  if(appEl) appEl.style.height = appH + 'px';

  ['treble','bass'].forEach(clef=>{
    const ctrl = document.getElementById('ctrl-'+clef);
    const zone = document.getElementById('staff-zone-'+clef);
    if(!ctrl || !zone) return;

    // staff-zone: volledig scherm (achter alles), maar start onder de staff-top-bar
    const topBar    = document.getElementById('staff-top-bar-'+clef);
    const topBarH   = topBar ? topBar.offsetHeight : 0;
    zone.style.top    = topBarH + 'px';
    zone.style.bottom = '0';

    // Schaalslider hoogte = 25% van appH, maar minstens 60px
    const ctrlH   = ctrl.offsetHeight || 172;
    const availMid = appH - ctrlH - topBarH;
    const slH = Math.max(60, Math.round(Math.min(availMid * 0.5, appH * 0.25)));

    // Middelste notenbalklijn in viewport-coördinaten:
    // staffTop = appMid - staffHeight/2, midLine = staffTop + 2*ls
    // appMid = totalH/2 - tabH (canvas-coördinaten), canvas start op tabH → viewport = totalH/2 - tabH + tabH + 2*ls - tabH
    // Vereenvoudigd: midLineViewport = totalH/2 + ls/2
    // (want staffHeight = 4*ls, midLine = staffTop+2*ls = appMid-2*ls+2*ls = appMid → in viewport: appMid+tabH = totalH/2)
    // Correct: middelste lijn (index 2) = staffTop + 2*ls in canvas = appMid - 2*ls + 2*ls = appMid in canvas
    // appMid in canvas = totalH/2 - tabH → in viewport = totalH/2 - tabH + tabH = totalH/2
    // Dus middelste lijn in viewport = appH / 2 (= helft van de bruikbare hoogte)
    // In zone-coördinaten: appH/2 - zoneTopViewport
    const tabEl2    = document.getElementById('tabs');
    const tabH2     = tabEl2 ? tabEl2.offsetHeight : 72;
    const _trap2    = window._staffTrap || 8;
    const ls2       = Math.round(26 + (_trap2-4)*26/7);
    // staffTop in canvas = appMid_canvas - 2*ls, appMid_canvas = appH/2 - tabH2
    // middelste lijn in canvas = appMid_canvas
    // middelste lijn in viewport = tabH2 + appMid_canvas = tabH2 + appH/2 - tabH2 = appH/2
    const midLineViewport = Math.round(appH / 2);
    const zoneTopViewport = zone.getBoundingClientRect().top;
    const midLineInZone   = Math.round(midLineViewport - zoneTopViewport);
    // Slider gecentreerd op middelste notenbalklijn
    const sliderTop = Math.max(0, midLineInZone - Math.round(slH / 2));

    const sl = document.getElementById('scale-slider-'+clef);
    const scalecol = sl ? sl.closest('.scale-col') : null;
    if(sl) sl.style.height = slH + 'px';
    if(scalecol){
      scalecol.style.top    = sliderTop + 'px';
      scalecol.style.height = slH + 'px';
    }
  });
}
function resizeQuintCanvas(){
  const cv = document.getElementById('quint-canvas');
  if(!cv) return;
  // Breedte = halve schermbreedte
  const halfW = Math.floor(window.innerWidth / 2);
  const w = Math.max(80, halfW);
  // Hoogte: maximaal de beschikbare ruimte boven het verticale schermcentrum
  // zodat de cirkel niet over de onderste helft valt
  const appH  = getAppHeight ? getAppHeight() : window.innerHeight;
  const cvTop = cv.getBoundingClientRect().top;
  const maxH  = Math.max(140, Math.round(appH * 0.65) - Math.round(cvTop));
  const size  = Math.max(140, Math.min(220, Math.min(w, Math.max(140, maxH))));
  cv.width  = size;
  cv.height = size;
  cv.style.width  = size + 'px';
  cv.style.height = size + 'px';
  renderQuint();
  positionEnharmRow();
  alignMiniStavesWithQuint();
}

function positionEnharmRow(){

function alignMiniStavesWithQuint(){
  const cv        = document.getElementById('quint-canvas');
  const stavesDiv = document.getElementById('p0-staves');
  const miniCv    = document.getElementById('mini-system-canvas');
  if(!cv || !stavesDiv) return;

  // Onderkant kwintencirkel in viewport-coördinaten
  const quintBot = cv.getBoundingClientRect().bottom;

  // Bovenkant van p0-staves in viewport-coördinaten
  const stavesTop = stavesDiv.getBoundingClientRect().top;

  // Hoogte van het mini-canvas (CSS hoogte)
  const canvasH = miniCv ? miniCv.offsetHeight || miniCv.height || 100 : 100;

  // marginTop zodat onderkant canvas = quintBot
  // onderkant canvas = stavesTop + marginTop + canvasH = quintBot
  // → marginTop = quintBot - stavesTop - canvasH
  const marginTop = Math.max(0, Math.round(quintBot - stavesTop - canvasH));
  stavesDiv.style.marginTop = marginTop + 'px';
}

  });

function updateNotePosSliderPadding(clef){
  const trap = window._staffTrap || 8;
  const ls = Math.round(26 + (trap-4)*26/7);
  const nr = ls * 0.52;
  const halfNoteW = Math.round(nr * 1.35);
  const staffLeft = 6;
  const nxMin = staffLeft + 2 * halfNoteW;
  // Canvas = volledige paginabreedte (staff-zone absolute left:0 right:0)
  const W = window.innerWidth;
  const nxMax = W - halfNoteW - 4;
  const thumbR = 11; // helft van thumb (22px)
  // wrap.left  = nxMin - thumbR  (zodat thumb-center bij 0% = nxMin)
  // wrap.right = W - nxMax - thumbR (zodat thumb-center bij 100% = nxMax)
  const wrapLeft  = nxMin - thumbR;
  const wrapRight = W - nxMax - thumbR;
  const clefs = clef ? [clef] : ['treble','bass'];
  clefs.forEach(cl=>{
    const wrap = document.getElementById('note-pos-wrap-'+cl);
    if(wrap){
      wrap.style.left  = wrapLeft  + 'px';
      wrap.style.right = wrapRight + 'px';
    }
  });
}

let _deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstall = e;
  const row = document.getElementById('install-row');
  if(row) row.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredInstall = null;
  const row = document.getElementById('install-row');
  if(row) row.style.display = 'none';
});

function installApp(){
  if(!_deferredInstall) return;
  _deferredInstall.prompt();
  _deferredInstall.userChoice.then(()=>{ _deferredInstall = null; });
  closeSettings();
}

function shareApp(){
  const data = {
    title: 'Notenkraker',
    text: 'Kies een toonsoort en laat direct vanaf een notenbalk de juiste noot klinken.',
    url: window.location.href
  };
  if(navigator.share){
    navigator.share(data).catch(()=>{});
  } else {
    navigator.clipboard.writeText(window.location.href)
      .then(()=>alert('Link gekopieerd naar klembord!'))
      .catch(()=>alert(window.location.href));
  }
  closeSettings();
}

// Taal: vlaggen + namen
// Twemoji SVG-vlaggen voor Windows-compatibiliteit
// Vlag-emoji → Twemoji codepoint: regional indicator A=1f1e6, B=1f1e7, ... Z=1f1ff
const LANGS = {
  nl:{ flag:'🇳🇱', twemoji:'1f1f3-1f1f1', label:'Nederlands' },
  en:{ flag:'🇬🇧', twemoji:'1f1ec-1f1e7', label:'English' },
  de:{ flag:'🇩🇪', twemoji:'1f1e9-1f1ea', label:'Deutsch' },
  fr:{ flag:'🇫🇷', twemoji:'1f1eb-1f1f7', label:'Français' },
  es:{ flag:'🇪🇸', twemoji:'1f1ea-1f1f8', label:'Español' },
  it:{ flag:'🇮🇹', twemoji:'1f1ee-1f1f9', label:'Italiano' },
  pt:{ flag:'🇵🇹', twemoji:'1f1f5-1f1f9', label:'Português' },
  zh:{ flag:'🇨🇳', twemoji:'1f1e8-1f1f3', label:'中文' },
};
let _currentLang = 'nl';

function flagImg(code, size){
  const lang = LANGS[code];
  if(!lang) return '';
  const sz = size || 20;
  return `<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/${lang.twemoji}.svg" width="${sz}" height="${sz}" style="vertical-align:middle;display:inline-block;" alt="${lang.flag}" onerror="this.replaceWith(document.createTextNode('${lang.flag}'))">`;
}

function initFlags(){
  // Vervang alle vlag-emoji's in lang-picker en current-flag door Twemoji SVG
  document.querySelectorAll('.lang-option').forEach(el=>{
    const code = el.dataset.lang;
    if(!code || !LANGS[code]) return;
    const flagSpan = el.querySelector('span');
    if(flagSpan) flagSpan.innerHTML = flagImg(code, 20);
  });
  const cf = document.getElementById('current-flag');
  if(cf) cf.innerHTML = flagImg('nl', 17);
}

function selectLang(code){
  _currentLang = code;
  const l = LANGS[code];
  const cf = document.getElementById('current-flag');
  if(cf) cf.innerHTML = flagImg(code, 17);
  const cl = document.getElementById('current-lang-label');
  if(cl) cl.textContent = l.label;
  document.querySelectorAll('.lang-option').forEach(el =>
    el.classList.toggle('active', el.dataset.lang === code)
  );
  document.getElementById('lang-picker').classList.remove('open');
}

// SWIPE NAVIGATIE TUSSEN TABBLADEN
// ════════════════════════════════════════
(function(){
  let sx=0, sy=0, st=0, ok=false;
  const THRESH=50, MAX_Y=80, MAX_MS=500;

  function blocked(el){
    // Nooit swipen op sliders, knoppen, of de canvas (notenbalken / kwintencirkel)
    return !!el.closest('input[type=range], button, canvas, .player-waveform-wrap');
  }
  function blockedForTab(el, tab){
    if(blocked(el)) return true;
    // Tab 0: ook uitgesloten = pitch-sectie
    if(tab===0 && el.closest('.pitch-section')) return true;
    // Tabs 1&2: ook uitgesloten = alles behalve de onderste bedieningsrij
    if((tab===1||tab===2) && !el.closest('.control-block')) return true;
    return false;
  }

  document.addEventListener('touchstart', e=>{
    ok = false;
    if(e.touches.length!==1) return;
    if(blockedForTab(e.target, currentTab)) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    ok = true;
  }, {passive:true, capture:true});

  document.addEventListener('touchend', e=>{
    if(!ok) return;
    ok = false;
    if(e.changedTouches.length!==1) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = Math.abs(e.changedTouches[0].clientY - sy);
    const dt = Date.now() - st;
    if(Math.abs(dx) < THRESH) return;   // te kort
    if(dy > MAX_Y)            return;   // te verticaal
    if(dt > MAX_MS)           return;   // te traag
    if(dy > Math.abs(dx)*0.7) return;   // meer verticaal dan horizontaal
    const next = dx<0 ? Math.min(currentTab+1,2) : Math.max(currentTab-1,0);
    if(next!==currentTab) showTabAnimated(next, dx<0?'left':'right');
  }, {passive:true, capture:true});
})();

// Prevent pinch-zoom (multi-finger touchmove)
document.addEventListener('touchmove', e=>{
  if(e.touches.length > 1) e.preventDefault();
},{passive:false});

function showTabAnimated(i, dir){
  const pages = Array.from(document.querySelectorAll('.page'));
  const cur   = pages[currentTab];
  const tgt   = pages[i];
  if(!cur || !tgt){ showTab(i); return; }

  const appEl = document.getElementById('app');
  const W = appEl.offsetWidth || window.innerWidth;
  const inX  = dir === 'left' ?  W : -W;
  const outX = dir === 'left' ? -W :  W;

  // Zet beide pagina's in sliding-modus (zichtbaar, absoluut in #app)
  const applyBase = (p, x, z) => {
    p.classList.add('sliding');
    p.style.position  = 'absolute';
    p.style.top       = '0';
    p.style.left      = '0';
    p.style.width     = '100%';
    p.style.height    = '100%';
    p.style.zIndex    = z;
    p.style.transform = `translateX(${x}px)`;
    p.style.transition= 'none';
  };

  applyBase(cur, 0, '5');
  applyBase(tgt, inX, '10');

  // Force reflow zodat de begintransform is toegepast
  void tgt.offsetWidth;

  // Start de transitie
  const ease = 'transform 0.27s cubic-bezier(.4,0,.2,1)';
  cur.style.transition = ease;
  tgt.style.transition = ease;
  cur.style.transform  = `translateX(${outX}px)`;
  tgt.style.transform  = 'translateX(0)';

  setTimeout(()=>{
    // Opruimen: alles terug naar normale toestand
    pages.forEach(p=>{
      p.classList.remove('sliding');
      p.style.cssText = '';
    });
    showTab(i);
  }, 290);
}
</script>
